<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>亲子中文对话</title>
    <style>
        body {
            text-align: center;
            font-family: "Microsoft YaHei", Arial, sans-serif;
            font-size: 24px;
            margin: 0;
            padding: 20px;
            background-color: #f0f8ff;
            color: #333;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 8px;
        }
        .subtitle {
            color: #7f8c8d;
            font-size: 18px;
            margin-bottom: 25px;
        }
        .question-btn {
            display: block;
            width: 90%;
            max-width: 620px;
            margin: 25px auto;
            padding: 25px 30px;
            font-size: 28px;
            font-weight: bold;
            line-height: 1.4;
            border: none;
            border-radius: 15px;
            background-color: #e74c3c;
            color: white;
            cursor: pointer;
            box-shadow: 0 6px 15px rgba(0,0,0,0.15);
        }
        .question-btn:active {
            transform: scale(0.97);
        }
        .english {
            display: block;
            font-size: 18px;
            font-weight: normal;
            margin-top: 10px;
            opacity: 0.9;
        }
        .answer-btn {
            display: block;
            width: 90%;
            max-width: 520px;
            margin: 15px auto;
            padding: 18px 20px;
            font-size: 26px;
            border: none;
            border-radius: 12px;
            background-color: #27ae60;
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .answer-btn:active {
            background-color: #219653;
            transform: scale(0.98);
        }
        #result {
            margin: 35px 0;
            min-height: 70px;
            font-size: 27px;
            font-weight: bold;
        }
        .control-btn {
            font-size: 22px;
            margin: 12px 8px;
            padding: 14px 32px;
            border: none;
            border-radius: 10px;
            background-color: #3498db;
            color: white;
            cursor: pointer;
        }
        .speak-btn {
            background-color: #f39c12;
        }
    </style>
</head>
<body>
    <h1>亲子中文对话</h1>
    <p class="subtitle">父母点击红色按钮问问题 → 电脑读给孩子听 → 孩子选择答案</p>

    <button id="questionBtn" class="question-btn">
        你饿了吗？
        <span class="english">Are you hungry?</span>
    </button>
    
    <p id="result"></p>
    
    <button id="btn1" class="answer-btn" style="display: none;">我饿了</button>
    <button id="btn2" class="answer-btn" style="display: none;">我不饿</button>

    <br><br>
    <button id="speakAnswerBtn" class="control-btn speak-btn" style="display: none;">🔊 再读一遍孩子的回答</button>
    <br><br>
    <button id="nextBtn" class="control-btn">下一句 →</button>

    <script>
        let data = [
            { q: "你饿了吗？", e: "Are you hungry?", a: ["我饿了", "我不饿"] },
            { q: "他是谁？", e: "Who is he?", a: ["他是我哥哥", "他是我爸爸"] },
            { q: "你叫什么名字？", e: "What is your name?", a: ["我叫Sophia", "我叫___"] },
            { q: "你今天怎么样？", e: "How are you today?", a: ["我很开心", "我很累"] },
            { q: "今天天气怎么样？", e: "How is the weather today?", a: ["今天晴天", "今天下雨"] },
            { q: "你住在哪里？", e: "Where do you live?", a: ["我住在Lawrence", "我住在家里", "我住在Kansas"] }
        ];

        let index = 0;
        let selectedAnswer = "";

        const questionBtn = document.getElementById("questionBtn");
        const resultEl = document.getElementById("result");
        const btn1 = document.getElementById("btn1");
        const btn2 = document.getElementById("btn2");
        const speakAnswerBtn = document.getElementById("speakAnswerBtn");
        const nextBtn = document.getElementById("nextBtn");

        function speak(text, isQuestion = false) {
            if (!('speechSynthesis' in window)) return;
            speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = "zh-CN";
            msg.rate = isQuestion ? 0.9 : 0.85;
            msg.pitch = isQuestion ? 1.05 : 1.1;
            speechSynthesis.speak(msg);
        }

        function showQuestion() {
            const current = data[index];

            // 更新红色问题按钮（中英文）
            questionBtn.innerHTML = `${current.q}<span class="english">${current.e}</span>`;

            resultEl.innerHTML = "";
            selectedAnswer = "";

            // 显示答案按钮（固定显示两个按钮）
            btn1.style.display = "block";
            btn2.style.display = "block";
            btn1.textContent = current.a[0];
            btn2.textContent = current.a[1] || "";   // 如果没有第二个答案就留空

            speakAnswerBtn.style.display = "none";

            // 自动朗读问题
            setTimeout(() => speak(current.q, true), 400);
        }

        function choose(text) {
            selectedAnswer = text;
            resultEl.innerHTML = `孩子说：<span style="color:#27ae60;">${text}</span>`;

            setTimeout(() => speak(text), 500);
            speakAnswerBtn.style.display = "inline-block";
        }

        function next() {
            index = (index + 1) % data.length;
            showQuestion();
        }

        // 初始化
        function init() {
            questionBtn.addEventListener("click", () => speak(data[index].q, true));
            btn1.addEventListener("click", () => choose(data[index].a[0]));
            btn2.addEventListener("click", () => choose(data[index].a[1]));

            speakAnswerBtn.addEventListener("click", () => {
                if (selectedAnswer) speak(selectedAnswer);
            });

            nextBtn.addEventListener("click", next);

            showQuestion();
        }

        window.onload = init;
    </script>
</body>
</html>
