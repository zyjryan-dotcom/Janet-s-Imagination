<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>亲子中文对话学习</title>
  <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --sky: #fef9f0;
      --cloud: #ffffff;
      --peach: #ffb347;
      --coral: #ff7043;
      --mint: #4caf8a;
      --mint-dark: #388e6a;
      --lavender: #9c77d4;
      --lavender-dark: #7b5bbb;
      --text: #3a2e2e;
      --soft: #a09090;
      --card-shadow: 0 10px 35px rgba(60,30,10,0.12);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      background: var(--sky);
      font-family: 'Noto Sans SC', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background-image: 
        radial-gradient(circle at 10% 20%, #ffe0b2 0%, transparent 40%),
        radial-gradient(circle at 85% 80%, #e8f5e9 0%, transparent 40%);
      overflow: hidden;
    }

    /* 启动层：解决发声限制 */
    #start-shield {
      position: fixed; inset: 0; background: var(--peach); z-index: 1000;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      color: white; cursor: pointer; text-align: center;
    }

    /* 漂浮装饰 */
    .deco { position: fixed; font-size: 2.2rem; opacity: 0.2; pointer-events: none; animation: float 6s ease-in-out infinite; z-index: 1; }
    .deco:nth-child(1) { top: 10%; left: 5%; }
    .deco:nth-child(2) { top: 15%; right: 8%; animation-delay: 1s; }
    .deco:nth-child(3) { bottom: 12%; left: 10%; animation-delay: 2s; }
    .deco:nth-child(4) { bottom: 20%; right: 7%; animation-delay: 3s; }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

    .card {
      background: var(--cloud); border-radius: 32px; box-shadow: var(--card-shadow);
      padding: 30px 25px; max-width: 550px; width: 100%; text-align: center;
      position: relative; z-index: 10;
    }

    /* 进度条 */
    .progress-bar { display: flex; gap: 6px; justify-content: center; margin-bottom: 25px; }
    .dot { width: 12px; height: 12px; border-radius: 50%; background: #eee; transition: 0.3s; }
    .dot.active { background: var(--peach); transform: scale(1.3); }
    .dot.done { background: var(--mint); }

    /* 问题区域 */
    .q-box { margin-bottom: 30px; cursor: pointer; padding: 10px; border-radius: 20px; transition: 0.2s; }
    .q-box:hover { background: #fffcf5; }
    #q-zh { font-family: 'Ma Shan Zheng', cursive; font-size: 2.5rem; color: var(--text); display: block; line-height: 1.2; }
    #q-en { font-size: 1.1rem; color: var(--soft); margin-top: 8px; display: block; }

    /* 答案区域 */
    .answers { display: flex; flex-direction: column; gap: 15px; margin-bottom: 25px; }
    .ans-btn {
      font-family: 'Ma Shan Zheng', cursive; font-size: 1.8rem; padding: 18px;
      border-radius: 18px; border: 3px solid transparent; cursor: pointer;
      background: #f8f4ef; color: var(--text); transition: 0.2s;
    }
    .ans-btn.selected {
      background: var(--mint); color: white; border-color: var(--mint-dark);
      transform: translateY(-2px); box-shadow: 0 5px 15px rgba(76,175,138,0.3);
    }
    /* 为第二个答案设置不同颜色 */
    .ans-btn:nth-child(2).selected { background: var(--lavender); border-color: var(--lavender-dark); box-shadow: 0 5px 15px rgba(156,119,212,0.3); }

    #feedback { min-height: 1.5em; font-size: 1.3rem; font-weight: bold; color: var(--mint-dark); margin-bottom: 20px; }

    .btn-next {
      background: linear-gradient(135deg, var(--peach), var(--coral));
      color: white; border: none; padding: 15px 40px; border-radius: 50px;
      font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.3s;
      box-shadow: 0 4px 12px rgba(255,112,67,0.3);
    }
    .btn-next:active { transform: scale(0.95); }

    .reading { animation: pulse 1s infinite; }
    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

    footer { margin-top: 25px; font-size: 0.85rem; color: var(--soft); z-index: 10; }
  </style>
</head>
<body>

  <div id="start-shield" onclick="initAudio()">
    <div style="font-size: 5rem; margin-bottom: 20px;">🐼</div>
    <h2>点击开始中文练习</h2>
    <p style="margin-top: 10px; opacity: 0.9;">Click to Start</p>
  </div>

  <div class="deco">🌸</div><div class="deco">⭐</div>
  <div class="deco">🌈</div><div class="deco">🎈</div>

  <div class="card">
    <div class="progress-bar" id="progress"></div>

    <div class="q-box" onclick="repeatQuestion()">
      <span id="q-zh">正在准备...</span>
      <span id="q-en">Ready...</span>
    </div>

    <div id="feedback"></div>

    <div class="answers" id="ans-list"></div>

    <button class="btn-next" onclick="goNext()">下一句 →</button>
  </div>

  <footer>Lawrence & Kansas 亲子中文课专用 ✨</footer>

  <script>
    const dialogs = [
      { q: "你饿了吗？", e: "Are you hungry?", a: ["我饿了", "我不饿"] },
      { q: "他是谁？", e: "Who is he?", a: ["他是我哥哥", "他是我爸爸"] },
      { q: "你叫什么名字？", e: "What is your name?", a: ["我叫Sophia", "我叫小明"] },
      { q: "你今天怎么样？", e: "How are you today?", a: ["我很开心", "我很累"] },
      { q: "今天天气怎么样？", e: "How is the weather today?", a: ["今天晴天", "今天下雨"] },
      { q: "你住在哪里？", e: "Where do you live?", a: ["我住在Lawrence", "我住在Kansas", "我住在家里"] }
    ];

    let currentIdx = 0;
    let synth = window.speechSynthesis;

    function initAudio() {
      // 必须由用户点击触发一次 speak
      const s = new SpeechSynthesisUtterance("");
      synth.speak(s);
      
      document.getElementById('start-shield').style.display = 'none';
      render();
    }

    function render() {
      const item = dialogs[currentIdx];
      
      // 更新进度
      const prog = document.getElementById('progress');
      prog.innerHTML = dialogs.map((_, i) => 
        `<div class="dot ${i === currentIdx ? 'active' : (i < currentIdx ? 'done' : '')}"></div>`
      ).join('');

      // 更新问题
      const qZh = document.getElementById('q-zh');
      qZh.textContent = item.q;
      document.getElementById('q-en').textContent = item.e;
      
      // 更新答案列表
      const list = document.getElementById('ans-list');
      list.innerHTML = "";
      item.a.forEach(text => {
        const btn = document.createElement('button');
        btn.className = 'ans-btn';
        btn.textContent = text;
        btn.onclick = () => handleSelect(text, btn);
        list.appendChild(btn);
      });

      document.getElementById('feedback').textContent = "";
      qZh.classList.add('reading');
      speak(item.q, () => qZh.classList.remove('reading'));
    }

    function handleSelect(text, btn) {
      document.querySelectorAll('.ans-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      
      const fb = document.getElementById('feedback');
      fb.textContent = `你说：${text} 🔊`;
      fb.classList.add('reading');
      
      speak(text, () => {
        fb.textContent = `你说：${text} ✅`;
        fb.classList.remove('reading');
      });
    }

    function speak(text, onEnd) {
      synth.cancel();
      const msg = new SpeechSynthesisUtterance(text);
      msg.lang = 'zh-CN';
      msg.rate = 0.85;
      
      // 寻找最自然的中文语音包
      const voices = synth.getVoices();
      const cnVoice = voices.find(v => v.name.includes('Xiaoxiao')) || 
                      voices.find(v => v.lang.includes('zh'));
      if (cnVoice) msg.voice = cnVoice;

      msg.onend = onEnd;
      synth.speak(msg);
    }

    function repeatQuestion() {
      const qZh = document.getElementById('q-zh');
      qZh.classList.add('reading');
      speak(dialogs[currentIdx].q, () => qZh.classList.remove('reading'));
    }

    function goNext() {
      currentIdx = (currentIdx + 1) % dialogs.length;
      render();
    }

    // 确保语音包加载
    if (speechSynthesis.onvoiceschanged !== undefined) {
      speechSynthesis.onvoiceschanged = () => synth.getVoices();
    }
  </script>
</body>
</html>
