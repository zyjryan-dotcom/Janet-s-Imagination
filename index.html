<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>亲子中文对话</title>
    <style>
        body {
            text-align: center;
            font-family: "Microsoft YaHei", Arial, sans-serif;
            font-size: 24px;
            margin: 0;
            padding: 20px;
            background-color: #f9f9f9;
            color: #333;
        }
        h2 {
            margin: 30px 0 20px;
            color: #2c3e50;
        }
        .answer-btn {
            display: block;
            width: 90%;
            max-width: 500px;
            margin: 15px auto;
            padding: 18px 20px;
            font-size: 26px;
            border: none;
            border-radius: 12px;
            background-color: #4CAF50;
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .answer-btn:active {
            background-color: #45a049;
            transform: scale(0.98);
        }
        #result {
            margin: 30px 0;
            min-height: 60px;
            font-size: 28px;
            font-weight: bold;
            color: #e74c3c;
        }
        .control-btn {
            font-size: 22px;
            margin: 10px 8px;
            padding: 12px 28px;
            border: none;
            border-radius: 8px;
            background-color: #3498db;
            color: white;
            cursor: pointer;
        }
        .control-btn:active {
            background-color: #2980b9;
        }
        .speak-btn {
            background-color: #e67e22;
        }
        .speak-btn:active {
            background-color: #d35400;
        }
    </style>
</head>
<body>
    <h2 id="question">你饿了吗？</h2>
    
    <button id="btn1" class="answer-btn">我饿了</button>
    <button id="btn2" class="answer-btn">我不饿</button>
    
    <p id="result"></p>
    
    <button id="speakBtn" class="control-btn speak-btn">🔊 读出来</button>
    <br><br>
    <button id="nextBtn" class="control-btn">下一句 →</button>

    <script>
        // Dialogue data - easy to add more later
        let data = [
            { q: "你饿了吗？", a: ["我饿了", "我不饿"] },
            { q: "你想喝什么？", a: ["我想喝水", "我想喝牛奶"] },
            { q: "你开心吗？", a: ["我很开心", "我不开心"] },
            { q: "今天天气怎么样？", a: ["今天天气很好", "今天下雨了"] }
        ];

        let index = 0;
        let selected = "";

        // Get elements
        const questionEl = document.getElementById("question");
        const resultEl = document.getElementById("result");
        const btn1 = document.getElementById("btn1");
        const btn2 = document.getElementById("btn2");
        const speakBtn = document.getElementById("speakBtn");
        const nextBtn = document.getElementById("nextBtn");

        function choose(text) {
            selected = text;
            resultEl.innerHTML = `你说：<span style="color:#27ae60;">${text}</span>`;
        }

        function speak() {
            if (selected === "") {
                resultEl.innerHTML = "请先选择一个答案哦~";
                return;
            }

            // Stop any previous speech
            speechSynthesis.cancel();

            const msg = new SpeechSynthesisUtterance(selected);
            msg.lang = "zh-CN";
            msg.rate = 0.85;   // Slower and clearer for kids
            msg.pitch = 1.1;   // Slightly higher, friendlier voice

            msg.onerror = function() {
                resultEl.innerHTML += "<br>（朗读失败，浏览器可能不支持中文语音）";
            };

            speechSynthesis.speak(msg);
        }

        function updateQuestion() {
            questionEl.textContent = data[index].q;
            
            btn1.textContent = data[index].a[0];
            btn2.textContent = data[index].a[1];

            // Reset selection
            resultEl.innerHTML = "";
            selected = "";
        }

        function next() {
            index = (index + 1) % data.length;
            updateQuestion();
        }

        // Initialize everything
        function init() {
            // Bind click events safely
            btn1.addEventListener("click", () => choose(data[index].a[0]));
            btn2.addEventListener("click", () => choose(data[index].a[1]));
            
            speakBtn.addEventListener("click", speak);
            nextBtn.addEventListener("click", next);

            updateQuestion();   // Show the first question
        }

        // Run when page loads
        window.onload = init;
    </script>
</body>
</html>
