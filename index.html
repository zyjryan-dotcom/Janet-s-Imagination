<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>亲子中文对话学习</title>
    <style>
        :root {
            --bg: #f0f8ff;
            --q-red: #e74c3c;
            --a-green: #27ae60;
            --btn-blue: #3498db;
            --text-dark: #2c3e50;
        }

        body {
            text-align: center;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            margin: 0;
            padding: 20px;
            background-color: var(--bg);
            color: #333;
            -webkit-tap-highlight-color: transparent;
        }

        /* 初始遮罩层 */
        #start-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--btn-blue); color: white;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 1000; cursor: pointer;
        }

        h1 { color: var(--text-dark); margin-bottom: 5px; font-size: 28px; }
        .subtitle { color: #7f8c8d; font-size: 16px; margin-bottom: 20px; padding: 0 10px; }

        .container { max-width: 600px; margin: 0 auto; }

        /* 问题按钮 */
        .question-box {
            background-color: var(--q-red);
            color: white;
            padding: 25px;
            border-radius: 20px;
            margin-bottom: 30px;
            cursor: pointer;
            box-shadow: 0 6px 15px rgba(231, 76, 60, 0.3);
            transition: transform 0.1s;
        }
        .question-box:active { transform: scale(0.96); }
        .q-text { font-size: 32px; font-weight: bold; display: block; line-height: 1.2; }
        .e-text { font-size: 18px; display: block; margin-top: 10px; opacity: 0.9; font-weight: normal; }

        /* 答案区域 */
        #answer-area { margin-bottom: 30px; display: flex; flex-direction: column; gap: 15px; }
        .answer-btn {
            background-color: var(--a-green);
            color: white;
            padding: 18px;
            font-size: 24px;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(39, 174, 96, 0.2);
            transition: all 0.2s;
        }
        .answer-btn:active { transform: scale(0.96); background-color: #219150; }
        .answer-btn.selected { border: 4px solid #fff; box-shadow: 0 0 15px rgba(39, 174, 96, 0.5); }

        #result-display {
            min-height: 40px; font-size: 24px; font-weight: bold; color: var(--a-green);
            margin-bottom: 20px;
        }

        .controls { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .ctrl-btn {
            padding: 12px 25px; font-size: 18px; border-radius: 10px; border: none;
            cursor: pointer; color: white; background-color: var(--btn-blue);
        }
        .repeat-btn { background-color: #f39c12; }
        .next-btn { background-color: var(--text-dark); }
        
        .footer-info { margin-top: 30px; font-size: 14px; color: #bdc3c7; }
    </style>
</head>
<body>

    <div id="start-overlay" onclick="startApp()">
        <span style="font-size: 60px;">📢</span>
        <h2 style="margin-top: 20px;">点击屏幕开始学习</h2>
        <p>Click to start the voice interaction</p>
    </div>

    <div class="container">
        <h1>亲子中文对话</h1>
        <p class="subtitle">父母点红色提问，孩子选绿色回答</p>

        <div id="question-box" class="question-box">
            <span id="q-zh" class="q-text">加载中...</span>
            <span id="q-en" class="e-text">Loading...</span>
        </div>

        <div id="result-display"></div>
        <div id="answer-area"></div>

        <div class="controls">
            <button id="repeat-btn" class="ctrl-btn repeat-btn" style="display: none;">🔊 再读一次</button>
            <button onclick="nextStep()" class="ctrl-btn next-btn">下一句 →</button>
        </div>

        <p class="footer-info">适合 Lawrence & Kansas 地区亲子练习</p>
    </div>

    <script>
        const studyData = [
            { q: "你饿了吗？", e: "Are you hungry?", a: ["我饿了", "我不饿"] },
            { q: "他是谁？", e: "Who is he?", a: ["他是我哥哥", "他是我爸爸"] },
            { q: "你叫什么名字？", e: "What is your name?", a: ["我叫Sophia", "我叫小明"] },
            { q: "你今天怎么样？", e: "How are you today?", a: ["我很开心", "我很累"] },
            { q: "今天天气怎么样？", e: "How is the weather today?", a: ["今天晴天", "今天下雨"] },
            { q: "你住在哪里？", e: "Where do you live?", a: ["我住在Lawrence", "我住在Kansas", "我住在家里"] }
        ];

        let currentIndex = 0;
        let currentSelected = "";
        let synth = window.speechSynthesis;

        function startApp() {
            document.getElementById('start-overlay').style.display = 'none';
            // 解决 iOS 首次播放静音的 Hack
            const silence = new SpeechSynthesisUtterance("");
            synth.speak(silence);
            showCurrent();
        }

        function speak(text, rate = 0.9) {
            synth.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = "zh-CN";
            msg.rate = rate;
            
            // 尝试获取更自然的中文语音
            const voices = synth.getVoices();
            const cnVoice = voices.find(v => v.lang.includes('zh') && v.name.includes('Xiaoxiao')) || 
                            voices.find(v => v.lang.includes('zh'));
            if (cnVoice) msg.voice = cnVoice;
            
            synth.speak(msg);
        }

        function showCurrent() {
            const data = studyData[currentIndex];
            document.getElementById('q-zh').textContent = data.q;
            document.getElementById('q-en').textContent = data.e;
            document.getElementById('result-display').textContent = "";
            document.getElementById('repeat-btn').style.display = 'none';
            
            const area = document.getElementById('answer-area');
            area.innerHTML = "";
            currentSelected = "";

            // 动态生成答案按钮（支持 2 个、3 个甚至更多）
            data.a.forEach(text => {
                const btn = document.createElement('button');
                btn.className = 'answer-btn';
                btn.textContent = text;
                btn.onclick = () => selectAnswer(text, btn);
                area.appendChild(btn);
            });

            // 自动读问题
            setTimeout(() => speak(data.q, 0.9), 300);
        }

        function selectAnswer(text, btnEl) {
            currentSelected = text;
            
            // UI 反馈
            document.querySelectorAll('.answer-btn').forEach(b => b.classList.remove('selected'));
            btnEl.classList.add('selected');
            document.getElementById('result-display').textContent = `孩子说：${text}`;
            document.getElementById('repeat-btn').style.display = 'inline-block';

            // 朗读
            speak(text, 0.85);
        }

        function nextStep() {
            currentIndex = (currentIndex + 1) % studyData.length;
            showCurrent();
        }

        // 绑定提问框点击再读
        document.getElementById('question-box').onclick = () => {
            speak(studyData[currentIndex].q, 0.9);
        };

        // 绑定重复朗读按钮
        document.getElementById('repeat-btn').onclick = () => {
            if (currentSelected) speak(currentSelected, 0.85);
        };

        // 预加载语音包
        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = () => synth.getVoices();
        }
    </script>
</body>
</html>
