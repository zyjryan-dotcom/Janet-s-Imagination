<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>亲子中文对话 - 父母问，孩子答</title>
    <style>
        body {
            text-align: center;
            font-family: "Microsoft YaHei", Arial, sans-serif;
            font-size: 24px;
            margin: 0;
            padding: 20px;
            background-color: #f0f8ff;
            color: #333;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 10px;
        }
        .question-btn {
            display: block;
            width: 90%;
            max-width: 600px;
            margin: 25px auto;
            padding: 20px 30px;
            font-size: 28px;
            font-weight: bold;
            border: none;
            border-radius: 15px;
            background-color: #e74c3c;
            color: white;
            cursor: pointer;
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }
        .question-btn:active {
            background-color: #c0392b;
            transform: scale(0.97);
        }
        .answer-btn {
            display: block;
            width: 90%;
            max-width: 500px;
            margin: 15px auto;
            padding: 18px 20px;
            font-size: 26px;
            border: none;
            border-radius: 12px;
            background-color: #27ae60;
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .answer-btn:active {
            background-color: #219653;
            transform: scale(0.98);
        }
        #result {
            margin: 30px 0;
            min-height: 70px;
            font-size: 26px;
            font-weight: bold;
        }
        .control-btn {
            font-size: 22px;
            margin: 12px 8px;
            padding: 14px 32px;
            border: none;
            border-radius: 10px;
            background-color: #3498db;
            color: white;
            cursor: pointer;
        }
        .speak-btn {
            background-color: #f39c12;
        }
    </style>
</head>
<body>
    <h1>亲子中文对话</h1>
    <p style="color:#7f8c8d; font-size:20px;">父母点问题 → 电脑读给孩子听 → 孩子选答案</p>

    <button id="questionBtn" class="question-btn">点击这里问孩子问题</button>
    
    <p id="result"></p>
    
    <button id="btn1" class="answer-btn" style="display:none;">选项1</button>
    <button id="btn2" class="answer-btn" style="display:none;">选项2</button>

    <br>
    <button id="speakAnswerBtn" class="control-btn speak-btn" style="display:none;">🔊 再读一遍孩子的回答</button>
    <br><br>
    <button id="nextBtn" class="control-btn">下一句 →</button>

    <script>
        let data = [
            { q: "你饿了吗？", a: ["我饿了", "我不饿"] },
            { q: "你想喝什么？", a: ["我想喝水", "我想喝牛奶"] },
            { q: "你开心吗？", a: ["我很开心", "我不开心"] },
            { q: "今天天气怎么样？", a: ["今天晴天", "今天下雨"] },
            { q: "你住在哪里？", a: ["我住在Lawrence", "我住在美国", "我住在家里", "我住在Kansas"] }
        ];

        let index = 0;
        let selectedAnswer = "";

        const questionBtn = document.getElementById("questionBtn");
        const resultEl = document.getElementById("result");
        const btn1 = document.getElementById("btn1");
        const btn2 = document.getElementById("btn2");
        const speakAnswerBtn = document.getElementById("speakAnswerBtn");
        const nextBtn = document.getElementById("nextBtn");

        function speak(text, isQuestion = false) {
            if (!('speechSynthesis' in window)) return;

            speechSynthesis.cancel();

            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = "zh-CN";
            msg.rate = isQuestion ? 0.9 : 0.85;   // Questions slightly faster
            msg.pitch = isQuestion ? 1.05 : 1.1;

            speechSynthesis.speak(msg);
        }

        function showQuestion() {
            const current = data[index];
            
            questionBtn.textContent = current.q;
            resultEl.innerHTML = "";
            selectedAnswer = "";

            // Show answer buttons
            btn1.style.display = "block";
            btn2.style.display = "block";
            btn1.textContent = current.a[0];
            btn2.textContent = current.a[1];

            speakAnswerBtn.style.display = "none";

            // Auto read the question to the kid
            setTimeout(() => {
                speak(current.q, true);
            }, 300);
        }

        function choose(text) {
            selectedAnswer = text;
            resultEl.innerHTML = `孩子说：<span style="color:#27ae60; font-size:28px;">${text}</span>`;

            // Auto read the child's answer
            setTimeout(() => {
                speak(text);
            }, 400);

            speakAnswerBtn.style.display = "inline-block";
        }

        function next() {
            index = (index + 1) % data.length;
            showQuestion();
        }

        // Event listeners
        function init() {
            questionBtn.addEventListener("click", () => {
                speak(questionBtn.textContent, true);
            });

            btn1.addEventListener("click", () => choose(data[index].a[0]));
            btn2.addEventListener("click", () => choose(data[index].a[1]));

            speakAnswerBtn.addEventListener("click", () => {
                if (selectedAnswer) speak(selectedAnswer);
            });

            nextBtn.addEventListener("click", next);

            // Start with first question
            showQuestion();
        }

        window.onload = init;
    </script>
</body>
</html>
